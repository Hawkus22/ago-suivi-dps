<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1E3C72">
  <title>PHARE — Suivi DPS</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="../pictures/PHARE Logo.png">
  <link rel="stylesheet" href="css/app.css">
  <!-- Supabase doit être chargé avant le module JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script type="module" src="js/app.js"></script>
</head>
<body>

  <!-- ── Écran de connexion ────────────────────────────────────────── -->
  <div id="login-screen" style="display:none">
    <div class="cfg-box">
      <img src="../pictures/PHARE Logo.png" class="login-img" alt="Logo PHARE">
      <div class="login-logo">PHARE</div>
      <p class="login-tagline">Suivi Départemental des DPS</p>
      <div class="fg">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="votre@email.fr"
               autocomplete="email" inputmode="email">
      </div>
      <div class="fg">
        <label>Mot de passe</label>
        <input type="password" id="login-pwd" placeholder="••••••••"
               autocomplete="current-password">
      </div>
      <p id="login-error" class="login-error" style="display:none"></p>
      <button class="btn-prim" id="btn-login" style="margin-top:8px">Se connecter</button>
      <div id="install-banner" style="display:none">
        <button class="btn-install" id="btn-install">📲 Ajouter à l'écran d'accueil</button>
      </div>
      <p id="ios-hint" class="ios-hint" style="display:none">
        📲 Pour installer : appuyez sur <b>□↑</b> puis <b>"Sur l'écran d'accueil"</b>
      </p>
    </div>
  </div>

  <!-- ── Écran définir mot de passe (invitation / recovery) ───────── -->
  <div id="set-password-screen" style="display:none">
    <div class="cfg-box">
      <div class="login-logo">PHARE</div>
      <p class="login-tagline">Définir votre mot de passe</p>
      <p id="set-pwd-email" class="set-pwd-email"></p>
      <div class="fg">
        <label>Nouveau mot de passe</label>
        <input type="password" id="set-pwd-1" placeholder="8 caractères minimum"
               autocomplete="new-password">
      </div>
      <div class="fg">
        <label>Confirmer le mot de passe</label>
        <input type="password" id="set-pwd-2" placeholder="Répétez le mot de passe"
               autocomplete="new-password">
      </div>
      <p id="set-pwd-error" class="login-error" style="display:none"></p>
      <button class="btn-prim" id="btn-set-pwd" style="margin-top:8px">Enregistrer</button>
    </div>
  </div>

  <!-- ── Application principale ─────────────────────────────────────── -->
  <div id="app" style="display:none">

    <header>
      <div class="hdr-top">
        <span class="app-title">PHARE</span>
        <div class="week-sel">
          <select id="semaine-select"><option value="">—</option></select>
          <button id="btn-new-week" class="hdr-btn" title="Nouvelle semaine">＋</button>
        </div>
        <button id="btn-refresh"  class="hdr-btn" title="Actualiser">↻</button>
        <button id="btn-synthese" class="hdr-btn" title="Synthèse semaine">📊</button>
        <span   id="user-email"   class="user-email"></span>
        <button id="btn-logout"   class="hdr-btn" title="Se déconnecter">🚪</button>
      </div>
      <div class="day-tabs" id="day-tabs"></div>
    </header>

    <main id="main-content"></main>

  </div>

  <!-- ── Modal (partagée) ───────────────────────────────────────────── -->
  <div id="modal-overlay" class="hidden">
    <div id="modal-content"></div>
  </div>

  <!-- ── Indicateur de chargement ───────────────────────────────────── -->
  <div id="loading">
    <div class="spinner"></div>
  </div>

</body>
</html>
