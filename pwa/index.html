<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1E3C72">
  <title>PHARE — Suivi DPS</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="../pictures/PHARE Logo.png">
  <link rel="stylesheet" href="css/app.css">
  <!-- Supabase doit être chargé avant le module JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script type="module" src="js/app.js"></script>
</head>
<body>

  <!-- ── Écran de configuration ─────────────────────────────────────── -->
  <div id="config-screen" style="display:none">
    <div class="cfg-box">
      <h2>PHARE</h2>
      <p>Entrez les informations de connexion Supabase.<br>
         Elles sont enregistrées localement sur cet appareil.</p>
      <div class="fg">
        <label>URL Supabase</label>
        <input type="url" id="input-url" placeholder="https://xxxxxxxxxxxx.supabase.co" autocomplete="off">
      </div>
      <div class="fg">
        <label>Clé anonyme (anon key)</label>
        <input type="text" id="input-key" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." autocomplete="off">
      </div>
      <button class="btn-prim" id="btn-save-config" style="margin-top:8px">Connecter →</button>
    </div>
  </div>

  <!-- ── Application principale ─────────────────────────────────────── -->
  <div id="app" style="display:none">

    <header>
      <div class="hdr-top">
        <span class="app-title">PHARE</span>
        <div class="week-sel">
          <select id="semaine-select"><option value="">—</option></select>
          <button id="btn-new-week" class="hdr-btn" title="Nouvelle semaine">＋</button>
        </div>
        <button id="btn-refresh"  class="hdr-btn" title="Actualiser">↻</button>
        <button id="btn-synthese" class="hdr-btn" title="Synthèse semaine">📊</button>
        <button id="btn-settings" class="hdr-btn" title="Paramètres">⚙</button>
      </div>
      <div class="day-tabs" id="day-tabs"></div>
    </header>

    <main id="main-content"></main>

  </div>

  <!-- ── Modal (partagée) ───────────────────────────────────────────── -->
  <div id="modal-overlay" class="hidden">
    <div id="modal-content"></div>
  </div>

  <!-- ── Indicateur de chargement ───────────────────────────────────── -->
  <div id="loading">
    <div class="spinner"></div>
  </div>

</body>
</html>
